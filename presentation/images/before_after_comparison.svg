<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e8a838" font-size="22" font-weight="bold">Britain Transformed · Before &amp; After the Industrial Revolution</text>

  <!-- ===== LEFT PANEL: Rural Britain (pre-1750) ===== -->
  <rect x="30" y="60" width="400" height="390" rx="10" fill="#1c3a2a" stroke="#4a7c59" stroke-width="1.5"/>
  <text x="230" y="90" text-anchor="middle" fill="#8fbc8f" font-size="18" font-weight="bold">Rural Britain · c. 1750</text>

  <!-- Sky -->
  <rect x="50" y="105" width="360" height="120" rx="6" fill="#5b8fa8"/>
  <!-- Sun -->
  <circle cx="350" cy="140" r="22" fill="#f4d35e"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="130" rx="35" ry="14" fill="#d0e8f0" opacity="0.7"/>
  <ellipse cx="200" cy="120" rx="28" ry="12" fill="#d0e8f0" opacity="0.6"/>
  <!-- Hills -->
  <ellipse cx="230" cy="225" rx="200" ry="50" fill="#5a8a4a"/>
  <ellipse cx="130" cy="225" rx="120" ry="40" fill="#6b9e5c"/>
  <ellipse cx="330" cy="225" rx="100" ry="35" fill="#4f7a3e"/>

  <!-- Cottage -->
  <rect x="170" y="175" width="50" height="35" fill="#c4a882"/>
  <polygon points="170,175 195,155 220,175" fill="#8b5e3c"/>
  <rect x="188" y="190" width="12" height="20" fill="#5a3e28"/>

  <!-- Trees -->
  <circle cx="100" cy="185" r="18" fill="#3d7a3d"/>
  <rect x="97" y="203" width="6" height="15" fill="#5a3e28"/>
  <circle cx="320" cy="190" r="15" fill="#3d7a3d"/>
  <rect x="317" y="205" width="6" height="12" fill="#5a3e28"/>

  <!-- Fields -->
  <rect x="50" y="225" width="360" height="45" rx="4" fill="#7ab648"/>
  <line x1="80" y1="235" x2="80" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="110" y1="235" x2="110" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="140" y1="235" x2="140" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="170" y1="235" x2="170" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="200" y1="235" x2="200" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="230" y1="235" x2="230" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="260" y1="235" x2="260" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="290" y1="235" x2="290" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="320" y1="235" x2="320" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="350" y1="235" x2="350" y2="265" stroke="#5a8a3a" stroke-width="1"/>
  <line x1="380" y1="235" x2="380" y2="265" stroke="#5a8a3a" stroke-width="1"/>

  <!-- Stats panel -->
  <rect x="50" y="285" width="360" height="150" rx="6" fill="#16302a" opacity="0.9"/>
  <text x="230" y="310" text-anchor="middle" fill="#8fbc8f" font-size="13" font-weight="bold">Life in Rural Britain</text>
  <text x="70" y="335" fill="#ccc" font-size="12">🏡  Small villages &amp; cottages</text>
  <text x="70" y="358" fill="#ccc" font-size="12">🌾  Hand looms &amp; farming</text>
  <text x="70" y="381" fill="#ccc" font-size="12">👨‍👩‍👦  Family-based work at home</text>
  <text x="70" y="404" fill="#ccc" font-size="12">🕊️  Clean air, slow pace</text>
  <text x="70" y="427" fill="#8fbc8f" font-size="12" font-weight="bold">📊  Manchester pop.: ~25,000</text>

  <!-- ===== CENTER ARROW ===== -->
  <polygon points="440,250 460,230 460,242 490,242 490,258 460,258 460,270" fill="#e8a838"/>
  <text x="465" y="290" text-anchor="middle" fill="#e8a838" font-size="11" font-weight="bold">100</text>
  <text x="465" y="304" text-anchor="middle" fill="#e8a838" font-size="11" font-weight="bold">YEARS</text>

  <!-- ===== RIGHT PANEL: Industrial Britain (c. 1850) ===== -->
  <rect x="500" y="60" width="370" height="390" rx="10" fill="#2a1a1a" stroke="#8b4513" stroke-width="1.5"/>
  <text x="685" y="90" text-anchor="middle" fill="#cd6839" font-size="18" font-weight="bold">Industrial Britain · c. 1850</text>

  <!-- Smoky sky -->
  <rect x="520" y="105" width="330" height="120" rx="6" fill="#4a4a4a"/>
  <!-- Smoke clouds -->
  <ellipse cx="600" cy="125" rx="40" ry="16" fill="#666" opacity="0.7"/>
  <ellipse cx="700" cy="118" rx="50" ry="18" fill="#555" opacity="0.6"/>
  <ellipse cx="780" cy="130" rx="35" ry="14" fill="#666" opacity="0.5"/>

  <!-- Factory buildings -->
  <rect x="540" y="150" width="60" height="75" fill="#5a3e28"/>
  <rect x="540" y="140" width="60" height="10" fill="#4a2e18"/>
  <!-- Chimney 1 -->
  <rect x="555" y="105" width="14" height="45" fill="#6b4226"/>
  <!-- Smoke from chimney 1 -->
  <ellipse cx="562" cy="105" rx="12" ry="8" fill="#888" opacity="0.5"/>

  <!-- Factory 2 -->
  <rect x="620" y="160" width="80" height="65" fill="#5a3e28"/>
  <rect x="620" y="150" width="80" height="10" fill="#4a2e18"/>
  <!-- Chimney 2 -->
  <rect x="680" y="110" width="14" height="50" fill="#6b4226"/>
  <!-- Smoke from chimney 2 -->
  <ellipse cx="687" cy="110" rx="15" ry="10" fill="#888" opacity="0.5"/>

  <!-- Factory 3 -->
  <rect x="720" y="155" width="70" height="70" fill="#5a3e28"/>
  <!-- Chimney 3 -->
  <rect x="760" y="115" width="12" height="40" fill="#6b4226"/>
  <ellipse cx="766" cy="115" rx="10" ry="7" fill="#888" opacity="0.5"/>

  <!-- Factory windows (dim yellow glow) -->
  <rect x="550" y="165" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="568" y="165" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="550" y="185" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="568" y="185" width="10" height="12" fill="#c4a832" opacity="0.6"/>

  <rect x="635" y="170" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="655" y="170" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="675" y="170" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="635" y="190" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="655" y="190" width="10" height="12" fill="#c4a832" opacity="0.6"/>
  <rect x="675" y="190" width="10" height="12" fill="#c4a832" opacity="0.6"/>

  <!-- Crowded row houses -->
  <rect x="520" y="225" width="330" height="45" rx="2" fill="#4a3828"/>
  <rect x="525" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="547" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="569" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="591" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="613" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="635" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="657" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="679" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="701" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="723" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="745" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="767" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="789" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>
  <rect x="811" y="228" width="18" height="38" fill="#3a2818" stroke="#5a4030" stroke-width="0.5"/>

  <!-- Stats panel -->
  <rect x="520" y="285" width="330" height="150" rx="6" fill="#2a1616" opacity="0.9"/>
  <text x="685" y="310" text-anchor="middle" fill="#cd6839" font-size="13" font-weight="bold">Life in Industrial Britain</text>
  <text x="540" y="335" fill="#ccc" font-size="12">🏭  Factories &amp; smokestacks</text>
  <text x="540" y="358" fill="#ccc" font-size="12">⏰  14–16 hour shifts, 6 days/week</text>
  <text x="540" y="381" fill="#ccc" font-size="12">👶  Children as young as 5 in mills</text>
  <text x="540" y="404" fill="#ccc" font-size="12">☠️  Life expectancy: as low as 17 yrs</text>
  <text x="540" y="427" fill="#cd6839" font-size="12" font-weight="bold">📊  Manchester pop.: ~303,000</text>

  <!-- Bottom caption -->
  <text x="450" y="478" text-anchor="middle" fill="#aaa" font-size="12" font-style="italic">"Progress came at a staggering human cost."</text>
</svg>
